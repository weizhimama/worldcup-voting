<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026世界杯投票漂流瓶</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #fff; }
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 70px; }
.page { display: none; }
.page.active { display: block; }
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; }
.header h1 { font-size: 24px; margin-bottom: 5px; }
.subtitle { font-size: 14px; opacity: 0.9; }
.stats-bar { display: flex; justify-content: space-around; padding: 20px; background: rgba(255,255,255,0.1); margin: 15px; border-radius: 15px; }
.stat-item { text-align: center; }
.stat-value { display: block; font-size: 24px; font-weight: 700; color: #ffd700; }
.stat-label { font-size: 12px; opacity: 0.8; }
.section-title { display: flex; justify-content: space-between; padding: 15px 20px; }
.section-title h2 { font-size: 18px; }
.match-list { padding: 0 15px; }
.match-card { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
.match-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 12px; opacity: 0.8; }
.teams { display: flex; justify-content: space-between; align-items: center; }
.team-brief { text-align: center; flex: 1; }
.team-flag { font-size: 32px; margin-bottom: 5px; }
.team-name { font-size: 14px; }
.vs { font-size: 12px; opacity: 0.5; padding: 0 10px; }
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; background: rgba(26,26,46,0.95); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.1); }
.nav-item { background: none; border: none; color: #fff; opacity: 0.6; cursor: pointer; padding: 5px 20px; }
.nav-item.active { opacity: 1; }
.nav-icon { display: block; font-size: 24px; margin-bottom: 3px; }
.nav-text { display: block; font-size: 12px; }
.match-status { padding: 3px 10px; border-radius: 10px; font-size: 11px; background: rgba(102,126,234,0.3); color: #a8b4ff; }
.vote-preview { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
.vote-bar-mini { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; display: flex; }
.vote-bar-mini .home { background: #667eea; width: 63%; }
.vote-bar-mini .draw { background: #ffd700; width: 9%; }
.vote-bar-mini .away { background: #ff6b6b; width: 28%; }
.vote-labels { display: flex; justify-content: space-between; font-size: 11px; margin-top: 5px; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="app">
        <div id="home-page" class="page active">
            <header class="header">
                <h1>🏆 2026世界杯</h1>
                <p class="subtitle">投票预测 · 漂流瓶交流</p>
            </header>
            <div class="stats-bar">
                <div class="stat-item"><span class="stat-value">104</span><span class="stat-label">总场次</span></div>
                <div class="stat-item"><span class="stat-value">0</span><span class="stat-label">参与投票</span></div>
                <div class="stat-item"><span class="stat-value">0</span><span class="stat-label">漂流瓶</span></div>
            </div>
            <div class="section-title">
                <h2>📅 今日比赛</h2>
                <span>5月15日 星期四</span>
            </div>
            <div class="match-list">
                <div class="match-card">
                    <div class="match-header">
                        <span>⏰ 06:00</span>
                        <span class="match-status">即将开始</span>
                    </div>
                    <div class="teams">
                        <div class="team-brief"><div class="team-flag">🇧🇷</div><div class="team-name">巴西</div></div>
                        <div class="vs">VS</div>
                        <div class="team-brief"><div class="team-flag">🇲🇦</div><div class="team-name">摩洛哥</div></div>
                    </div>
                    <div class="vote-preview">
                        <div class="vote-bar-mini"><div class="home"></div><div class="draw"></div><div class="away"></div></div>
                        <div class="vote-labels"><span>63%</span><span>9%</span><span>28%</span></div>
                    </div>
                </div>
                <div class="match-card">
                    <div class="match-header">
                        <span>⏰ 09:00</span>
                        <span class="match-status">即将开始</span>
                    </div>
                    <div class="teams">
                        <div class="team-brief"><div class="team-flag">🇺🇸</div><div class="team-name">美国</div></div>
                        <div class="vs">VS</div>
                        <div class="team-brief"><div class="team-flag">🇵🇾</div><div class="team-name">巴拉圭</div></div>
                    </div>
                </div>
                <div class="match-card">
                    <div class="match-header">
                        <span>⏰ 06:00</span>
                        <span class="match-status">即将开始</span>
                    </div>
                    <div class="teams">
                        <div class="team-brief"><div class="team-flag">🇳🇱</div><div class="team-name">荷兰</div></div>
                        <div class="vs">VS</div>
                        <div class="team-brief"><div class="team-flag">🇯🇵</div><div class="team-name">日本</div></div>
                    </div>
                </div>
            </div>
        </div>
        <nav class="bottom-nav">
            <button class="nav-item active"><span class="nav-icon">🏠</span><span class="nav-text">首页</span></button>
            <button class="nav-item"><span class="nav-icon">🍶</span><span class="nav-text">漂流瓶</span></button>
            <button class="nav-item"><span class="nav-icon">👤</span><span class="nav-text">我的</span></button>
        </nav>
    </div>
</body>
</html>
